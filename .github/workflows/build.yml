name: C Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libcjson-dev pkg-config

    - name: Compile
      run: |
        gcc hjonk.c -o hjonkcli $(pkg-config --cflags --libs libcurl libcjson)

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: hjonkcli-binary
        path: hjonkcli
